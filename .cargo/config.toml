# Leandros build configuration
#
# rust-toolchain.toml pins the nightly toolchain and pre-fetches both targets,
# so no manual rustup commands are needed.
#
# Common commands:
#   cargo build --target aarch64-unknown-none          # AArch64 / QEMU
#   cargo build --target aarch64-unknown-none \
#               --features rpi5                        # AArch64 / Raspberry Pi 5
#   cargo build --target x86_64-unknown-none           # x86-64 / UEFI PC
#   cargo run   --target x86_64-unknown-none           # x86-64 in QEMU (Limine+OVMF)
#
# For fast type-checking on the host (no bare-metal toolchain needed):
#   cargo check --target aarch64-linux-android

[build]
target = "aarch64-unknown-kernel"

# ── AArch64 — QEMU virt, direct ELF load ─────────────────────────────────────
[target.aarch64-unknown-kernel]
runner = [
    "qemu-system-aarch64",
    "-machine", "virt",
    "-cpu",     "cortex-a57",
    "-m",       "256M",
    "-nographic",
    "-serial",  "mon:stdio",
    "-kernel",
]
rustflags = []

# ── x86-64 — Limine UEFI on a FAT32 disk image ───────────────────────────────
# The script downloads Limine once (cached in target/limine/), builds a fresh
# disk image each run, and launches QEMU with OVMF.
# Prerequisites (install once):
#   sudo apt install ovmf dosfstools mtools qemu-system-x86
[target.x86_64-unknown-kernel]
runner = "scripts/run-x86_64.sh"
rustflags = []
